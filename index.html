<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="VortexSpira® EdTech es una plataforma de audio-aprendizaje inmersivo para ingenieros, con foco en la accesibilidad cognitiva y cero ansiedad. Explora cursos de Desarrollo de Software, DevOps y QA.">

    <title>VortexSpira® EdTech: Selector de Cursos</title> 

    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <link rel="preload" href="fonts/AtkinsonHyperlegible-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="fonts/Lexend-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <link rel="preload" href="fonts/AtkinsonHyperlegible-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="fonts/Lexend-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="styles/style-base.css">

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "EducationalOrganization",
  "name": "VortexSpira EdTech",
  "alternateName": "VortexSpira",
  "url": "https://vortexspira.com",
  "logo": "https://vortexspira.com/logo.png",
  "description": "Plataforma de audio-aprendizaje y dictado de código para ingenieros de software, QA y DevOps con enfoque en accesibilidad cognitiva.",
  "sameAs": [
    "https://www.linkedin.com/company/vortexspira"
  ]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": "Especialidades Técnicas de VortexSpira EdTech",
  "description": "Formación inmersiva en desarrollo de software, pruebas de calidad (QA) y ciberseguridad.",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "item": {
        "@type": "WebPage",
        "name": "Desarrollo de Software",
        "url": "https://www.vortexspira.com/?id=s-ds"
      }
    },
    {
      "@type": "ListItem",
      "position": 2,
      "item": {
        "@type": "WebPage",
        "name": "Pruebas de Software (QA)",
        "url": "https://www.vortexspira.com/?id=s-qa"
      }
    },
    {
      "@type": "ListItem",
      "position": 3,
      "item": {
        "@type": "WebPage",
        "name": "Ciberseguridad",
        "url": "https://www.vortexspira.com/?id=c-cseg"
      }
    }
  ]
}
</script>

</head>
<body>

    <header id="app-header">
        <div id="header-content-wrapper">
            <h1 id="main-header-title">VortexSpira EdTech</h1> 
            <button id="btn-config-accesibilidad" aria-label="Abrir Configuración de Accesibilidad" tabindex="0"></button>
        </div>
    </header>

    <main id="app-container">
        <div id="vista-volver" role="region" aria-label="Controles de navegación"> 
            <div id="card-nivel-actual" aria-live="polite"></div>
            <div id="card-volver-fija-elemento" role="button"></div>
            <div id="columna-volver-relleno"></div>
        </div>

        <div id="vista-central" role="region">
            <div id="vista-navegacion-desktop" class="vista active">
                <div class="carousel-mask">
                    <div class="mask-left"></div>
                    <div class="mask-right"></div>
                </div>
                <div id="nav-swiper" class="swiper carousel-viewport">
                    <div class="swiper-wrapper grid-track" id="track-desktop"></div>
                </div>
            </div>

            <div id="vista-navegacion-tablet" class="vista">
                <div class="carousel-mask">
                    <div class="mask-left"></div>
                    <div class="mask-right"></div>
                </div>
                <div id="nav-swiper-tablet" class="swiper carousel-viewport">
                    <div class="swiper-wrapper grid-track" id="track-tablet"></div>
                </div>
            </div>

            <div id="vista-navegacion-mobile" class="vista">
                <div id="nav-swiper-mobile" class="swiper carousel-viewport">
                    <div class="swiper-wrapper" id="track-mobile"></div>
                </div>
            </div>

            <div id="vista-detalle-desktop" class="vista">
                <div id="detalle-swiper-desktop" class="swiper detalle-viewport">
                    <div class="swiper-wrapper" id="detalle-track-desktop"></div>
                </div>
            </div>

            <div id="vista-detalle-mobile" class="vista vista-mobile-fullscreen">
                <div id="detalle-swiper-mobile" class="swiper detalle-viewport">
                    <div class="swiper-wrapper" id="detalle-track-mobile"></div>
                </div>
            </div>
        </div>

        <div id="info-adicional">
            <details id="help-panel" open>
                <summary id="info-adicional-titulo-ayuda"></summary>
                <small>
                    <ul id="info-adicional-lista-ayuda">
                        <li id="info-adicional-ayuda-gira"></li>
                        <li id="info-adicional-ayuda-vuelve"></li>
                    </ul>
                </small>
            </details>
        </div>

        <div id="toast-notification" class="toast" role="status" aria-live="polite"></div>
    </main>

    <button id="btn-volver-navegacion" tabindex="-1">↩️ Volver</button>

    <footer><small id="footer-content"></small></footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="code/app.js"></script> 
    <script type="module">
        import * as app from './code/app.js';
        document.addEventListener('DOMContentLoaded', () => {
            if (app.init) { app.init(); }
        });
    </script>

    <div style="display:none;" aria-hidden="true">
    <p>VortexSpira EdTech ofrece formación técnica en:</p>
    <ul>
        <li>Desarrollo Web (Frontend, Backend, APIs)</li>
        <li>QA y Software Testing (Automatización, DOM, Accesibilidad)</li>
        <li>Cyberseguridad y DevOps</li>
    </ul>
    </div>
</body>
</html>

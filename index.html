<html lang="es">
<head>

    <title>VortexSpira® EdTech: Selector de Cursos</title> 

    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <link rel="modulepreload" href="code/services/app-utils.js">
    <link rel="modulepreload" href="code/features/a11y/app-feedback.js">
    <link rel="modulepreload" href="code/core/app-layout.js">
    <link rel="modulepreload" href="code/core/app-router.js">
    <link rel="modulepreload" href="code/core/app-events.js">
    <link rel="modulepreload" href="code/features/a11y/a11y.js">
    <link rel="modulepreload" href="code/services/data.js">

    <link rel="preconnect" href="https://jsdelivr.net" crossorigin>

    <link rel="preload" href="resources/fonts/AtkinsonHyperlegible-Regular.woff2" 
          as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="resources/fonts/Lexend-Regular.woff2" 
          as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="resources/fonts/AtkinsonHyperlegible-Bold.woff2" 
          as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="resources/fonts/Lexend-Bold.woff2" 
          as="font" type="font/woff2" crossorigin="anonymous">

    <link rel="stylesheet" href="styles/themes/style-theme.css">
    <link rel="stylesheet" href="styles/base/style-layout.css">
    <link rel="stylesheet" href="styles/components/style-cards.css">
    <link rel="stylesheet" href="styles/components/style-components.css">
    <link rel="stylesheet" href="styles/components/style-header.css">
    <link rel="stylesheet" href="styles/components/style-footer.css">

    <link rel="preload" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" 
          as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    </noscript>

    <link rel="preload" href="styles/base/style-fonts.css" 
          as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="styles/base/style-fonts.css">
    </noscript>
    
    <link rel="preload" href="styles/media/style-media-base.css" 
          as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="styles/media/style-media-base.css">
    </noscript>

    <link rel="preload" href="styles/base/style-no-opacity.css" 
          as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="styles/base/style-no-opacity.css">
    </noscript>

    <link rel="stylesheet" href="styles/themes/style-theme-contrast.css" 
          media="(prefers-contrast: more)">
    <link rel="stylesheet" href="styles/themes/style-theme-forced-colors.css" 
          media="(forced-colors: active)">
    <link rel="stylesheet" href="styles/base/style-reduce-motion.css" 
          media="(prefers-reduced-motion: reduce)">
    <link rel="stylesheet" href="styles/themes/style-theme-scheme-light.css" 
          media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="styles/themes/style-theme-scheme-dark.css" 
          media="(prefers-color-scheme: dark)">

    <style>
        #app-skeleton {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121212; /* Ajusta al color exacto de tu fondo dark */
            z-index: 9999; /* Por encima de Swiper hasta que esté listo */
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box;
            /* 🟢 El gatillo del swap sin parpadeos */
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .skel-header { height: 60px; background: #2a2a2a; border-radius: 8px; margin-bottom: 20px; animation: skel-pulse 1.5s infinite; }
        .skel-volver { height: 40px; background: #222; border-radius: 8px; width: 60%; margin-bottom: 20px; animation: skel-pulse 1.5s infinite; }
        .skel-card { flex: 1; background: #1e1e1e; border-radius: 16px; animation: skel-pulse 1.5s infinite; }
        
        @keyframes skel-pulse { 0% { opacity: 0.6; } 50% { opacity: 0.3; } 100% { opacity: 0.6; } }

        /* Magia: Cuando app.js añade la clase, el esqueleto se desvanece revelando el Swiper ya montado debajo */
        body.app-loaded #app-skeleton {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <header id="app-header">
        <div id="header-content-wrapper">
            <h1 id="main-header-title">VortexSpira EdTech</h1> 
        </div>
    </header>

    <main id="app-container">
        <div id="app-skeleton" aria-hidden="true">
            <div class="skel-header"></div>
            <div class="skel-volver"></div>
            <div class="skel-card"></div>
        </div>

        <div id="vista-volver" role="region" aria-label="Controles de navegación"> 
            <div id="card-nivel-actual" aria-live="polite"></div>
            <div id="card-volver-fija-elemento" role="button"></div>
            <div id="columna-volver-relleno"></div>
        </div>

        <div id="vista-central" role="region">
            <div id="vista-navegacion-desktop" class="vista active">
                <div class="carousel-mask">
                    <div class="mask-left"></div>
                    <div class="mask-right"></div>
                </div>
                <div id="nav-swiper" class="swiper carousel-viewport">
                    <div class="swiper-wrapper grid-track" id="track-desktop" role="menu"></div>
                </div>
            </div>

            <div id="vista-navegacion-tablet" class="vista">
                <div class="carousel-mask">
                    <div class="mask-left"></div>
                    <div class="mask-right"></div>
                </div>
                <div id="nav-swiper-tablet" class="swiper carousel-viewport">
                    <div class="swiper-wrapper grid-track" id="track-tablet" role="menu"></div>
                </div>
            </div>

            <div id="vista-navegacion-mobile" class="vista">
                <div id="nav-swiper-mobile" class="swiper carousel-viewport">
                    <div class="swiper-wrapper" id="track-mobile" role="menu"></div>
                </div>
            </div>

            <div id="vista-detalle-desktop" class="vista">
                <div id="detalle-swiper-desktop" class="swiper detalle-viewport">
                    <div class="swiper-wrapper" id="detalle-track-desktop"></div>
                </div>
            </div>

            <div id="vista-detalle-mobile" class="vista vista-mobile-fullscreen">
                <div id="detalle-swiper-mobile" class="swiper detalle-viewport">
                    <div class="swiper-wrapper" id="detalle-track-mobile"></div>
                </div>
            </div>
        </div>

        <div id="info-adicional">
            <details id="help-panel" open>
                <summary id="info-adicional-titulo-ayuda"></summary>
                <small>
                    <ul id="info-adicional-lista-ayuda">
                        <li id="info-adicional-ayuda-gira"></li>
                        <li id="info-adicional-ayuda-vuelve"></li>
                    </ul>
                </small>
            </details>
        </div>

        <div id="toast-notification" class="toast" role="status" aria-hidden="true"></div>
    </main>

    <footer><small id="footer-content"></small></footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer></script>
    <script type="module" src="code/core/app.js"></script> 
    <script type="module">
        import * as app from './code/core/app.js';
        document.addEventListener('DOMContentLoaded', () => {
            if (app.init) { app.init(); }
        });
    </script>

</body>
</html>

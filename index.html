<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0, 
                   maximum-scale=5.0, 
                   user-scalable=yes">
    <meta name="robots" content="index, follow, noai, noimageai">
    <meta name="description" 
          content="VortexSpira EdTech: Aprende desarrollo de software, QA y DevOps desde cero a arquitecto. Plataforma AAA con diseño universal, verbalización desacoplada y cero fatiga cognitiva.">

    <title>VortexSpira® EdTech: Selector de Cursos</title> 

    <link
        rel="icon"
        href="/favicon.ico"
        type="image/x-icon">

    <link
        rel="preload"
        href="data/strings/strings_es.json"
        as="fetch"
        crossorigin="anonymous">
    <link
        rel="preload"
        href="data/courses/cursos_es.json"
        as="fetch"
        crossorigin="anonymous">

    <link
        rel="modulepreload"
        href="code/core/app.js">
    <link
        rel="modulepreload"
        href="code/services/app-utils.js">
    <link
        rel="modulepreload"
        href="code/services/data.js">


    <link
        rel="preload"
        href="code/vendor/swiper-bundle.min.js"
        as="script">

    <link
        rel="stylesheet"
        href="styles/themes/style-theme.css">
    <link
        rel="stylesheet"
        href="styles/base/style-layout.css">

    <link
        rel="preload"
        href="styles/components/style-header.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/components/style-footer.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/components/style-cards.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/components/style-components.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/vendor/swiper-bundle.min.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/base/style-fonts.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/base/style-no-opacity.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">

    <link
        rel="preload"
        href="styles/media/style-media-base.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/media/style-media-menu.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <link
        rel="preload"
        href="styles/media/style-media-details.css"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'">

    <link
        rel="stylesheet"
        href="styles/themes/style-theme-contrast.css"
        media="(prefers-contrast: more)">
    <link
        rel="stylesheet"
        href="styles/themes/style-theme-forced-colors.css"
        media="(forced-colors: active)">
    <link
        rel="stylesheet"
        href="styles/base/style-reduce-motion.css"
        media="(prefers-reduced-motion: reduce)">
    <link
        rel="stylesheet"
        href="styles/themes/style-theme-scheme-light.css"
        media="(prefers-color-scheme: light)">
    <link
        rel="stylesheet"
        href="styles/themes/style-theme-scheme-dark.css"
        media="(prefers-color-scheme: dark)">

    <noscript>
        <link
            rel="stylesheet"
            href="styles/components/style-header.css">
        <link
            rel="stylesheet"
            href="styles/components/style-footer.css">
        <link
            rel="stylesheet"
            href="styles/components/style-cards.css">
        <link
            rel="stylesheet"
            href="styles/components/style-components.css">
        <link
            rel="stylesheet"
            href="styles/vendor/swiper-bundle.min.css">
        <link
            rel="stylesheet"
            href="styles/base/style-fonts.css">
        <link
            rel="stylesheet"
            href="styles/media/style-media-base.css">
        <link
            rel="stylesheet"
            href="styles/media/style-media-menu.css">
        <link
            rel="stylesheet"
            href="styles/media/style-media-details.css">
    </noscript>
</head>

<body>

    <header id="app-header">
        <div id="header-content-wrapper">
            <h1 id="main-header-title">VortexSpira EdTech</h1> 
        </div>
    </header>

    <main id="app-container">
        <div id="vista-volver" role="region" data-i18n-aria="nav.aria.controls"> 
            <div id="card-nivel-actual" aria-live="polite"></div>
            <div id="card-volver-fija-elemento" role="button"></div>
            <div id="columna-volver-relleno"></div>
        </div>

        <div id="vista-central" role="region">
            <div id="vista-navegacion-desktop" class="vista active">
                <div class="carousel-mask">
                    <div class="mask-left"></div>
                    <div class="mask-right"></div>
                </div>
                <div id="nav-swiper" class="swiper carousel-viewport">
                    <div class="swiper-wrapper grid-track" id="track-desktop" role="menu"></div>
                </div>
            </div>

            <div id="vista-navegacion-tablet" class="vista">
                <div class="carousel-mask">
                    <div class="mask-left"></div>
                    <div class="mask-right"></div>
                </div>
                <div id="nav-swiper-tablet" class="swiper carousel-viewport">
                    <div class="swiper-wrapper grid-track" id="track-tablet" role="menu"></div>
                </div>
            </div>

            <div id="vista-navegacion-mobile" class="vista">
                <div id="nav-swiper-mobile" class="swiper carousel-viewport">
                    <div class="swiper-wrapper" id="track-mobile" role="menu"></div>
                </div>
            </div>

            <div id="vista-detalle-desktop" class="vista">
                <div id="detalle-swiper-desktop" class="swiper detalle-viewport">
                    <div class="swiper-wrapper" id="detalle-track-desktop"></div>
                </div>
            </div>

            <div id="vista-detalle-mobile" class="vista vista-mobile-fullscreen">
                <div id="detalle-swiper-mobile" class="swiper detalle-viewport">
                    <div class="swiper-wrapper" id="detalle-track-mobile"></div>
                </div>
            </div>
        </div>

        <div id="info-adicional">
            <details id="help-panel" open>
                <summary id="info-adicional-titulo-ayuda"></summary>
                <small>
                    <ul id="info-adicional-lista-ayuda">
                        <li id="info-adicional-ayuda-gira"></li>
                        <li id="info-adicional-ayuda-vuelve"></li>
                    </ul>
                </small>
            </details>
        </div>

        <div id="toast-notification" class="toast" role="status" aria-hidden="true"></div>
    </main>

    <footer><small id="footer-content"></small></footer>

    <script src="code/vendor/swiper-bundle.min.js" defer></script>
    <script type="module" src="code/core/app.js"></script> 
    <script type="module">
        import * as app from './code/core/app.js';
        document.addEventListener('DOMContentLoaded', () => {
            if (app.init) { app.init(); }
        });
    </script>

</body>
</html>
